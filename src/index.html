<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekaboo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <!--
      The overlay window content. `#viewer` opacity is driven by the
      reveal state machine (ghost / revealed / hidden) owned by the Rust core.
      Remote web content is loaded into the viewer in Phase 1 (iframe), so the
      transparent window + CSS-opacity model stays under our control.
    -->
    <main id="viewer" data-state="ghost">
      <!-- Borderless window: this top strip is the drag handle. In Phase 2 it
           becomes the hover hotzone; in Phase 4 it hosts the mini-toolbar. -->
      <div id="chrome" data-tauri-drag-region>
        <span class="drag-hint" aria-hidden="true">⠿</span>
      </div>
      <!-- Remote content is framed so we keep control of opacity/reveal.
           Some sites block framing (X-Frame-Options / CSP) — known limitation
           (feature-spec risk #3). -->
      <iframe id="content" referrerpolicy="no-referrer" title="Peekaboo viewer"></iframe>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
