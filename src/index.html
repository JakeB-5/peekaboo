<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Peekaboo</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="viewer" data-state="ghost">
      <!-- Borderless window: the center strip is the drag handle; the side
           toolbars hold the mini-controls (screen-design §③). -->
      <div id="chrome">
        <div class="toolbar">
          <button id="btn-settings" type="button" data-i18n-title="settings.open" title="Settings">☰</button>
          <button id="btn-bookmark" type="button" data-i18n-title="bookmark.add" title="Bookmark this page">★</button>
        </div>
        <span class="drag-hint" data-tauri-drag-region aria-hidden="true">⠿⠿⠿</span>
        <div class="toolbar">
          <button id="btn-panic" type="button" data-i18n-title="panic.hide" title="Hide (panic)">✕</button>
        </div>
      </div>

      <!-- The page is shown in a separate native webview (created at runtime by
           main.ts) below this chrome strip — NOT an iframe — so sites that block
           framing (X-Frame-Options) still load. -->


      <!-- Settings panel (screen-design §④). Hidden until the ☰ button. -->
      <section id="settings" hidden>
        <header class="s-head">
          <span data-i18n="settings.title">Peekaboo · Settings</span>
          <button id="btn-close" type="button" data-i18n-title="close" title="Close">✕</button>
        </header>
        <div class="s-body">
          <label class="s-field">
            <span data-i18n="field.language">Language</span>
            <select id="f-locale">
              <option value="auto" data-i18n="locale.auto">Auto (System)</option>
              <option value="en">English</option>
              <option value="ko">한국어</option>
              <option value="ja">日本語</option>
              <option value="zh">中文</option>
            </select>
          </label>

          <div class="s-sect" data-i18n="section.content">Content</div>
          <label class="s-field">
            <span>URL</span>
            <input id="f-url" type="text" spellcheck="false"
                   placeholder="https://example.com/article" />
          </label>
          <div class="s-field">
            <span data-i18n="field.bookmarks">Bookmarks</span>
            <div id="bookmarks" class="chips"></div>
          </div>

          <div class="s-sect" data-i18n="section.display">Display</div>
          <label class="s-field">
            <span data-i18n="field.ghostOpacity">Idle opacity</span>
            <input id="f-ghost" type="range" min="0" max="100" step="1" />
            <output id="o-ghost"></output>
          </label>
          <label class="s-field">
            <span data-i18n="field.hoverOpacity">Hover opacity</span>
            <input id="f-revealed" type="range" min="0" max="100" step="1" />
            <output id="o-revealed"></output>
          </label>
          <div class="s-field">
            <span data-i18n="field.windowSize">Window size</span>
            <input id="f-width" class="num" type="number" min="120" step="10" />
            <em class="x">×</em>
            <input id="f-height" class="num" type="number" min="120" step="10" />
          </div>
          <div class="s-field">
            <span data-i18n="field.hotzone">Hot-zone</span>
            <div id="hotzone-grid" class="hz" role="group" data-i18n-aria-label="hotzone.aria" aria-label="Hot-zone position"></div>
            <button id="hz-full" type="button" class="mini" data-i18n="hotzone.full">Full</button>
          </div>

          <div class="s-sect" data-i18n="section.escape">Escape · Concealment</div>
          <label class="s-field">
            <span data-i18n="field.panicShortcut">Panic hotkey</span>
            <input id="f-shortcut" type="text" readonly data-i18n-placeholder="shortcut.placeholder" placeholder="Click, then press a key combo" />
          </label>
          <label class="s-field toggle">
            <span data-i18n="field.alwaysOnTop">Always on top</span><input id="f-aot" type="checkbox" />
          </label>
          <label class="s-field toggle">
            <span data-i18n="field.allSpaces">All Spaces</span><input id="f-spaces" type="checkbox" />
          </label>
          <label class="s-field toggle">
            <span data-i18n="field.screenShareHide">Screen-share hiding</span><input id="f-cp" type="checkbox" />
            <em class="tag">best-effort</em>
          </label>
          <label class="s-field toggle">
            <span data-i18n="field.dockHide">Hide from Dock</span><input type="checkbox" checked disabled />
            <em class="tag">Accessory</em>
          </label>
        </div>
      </section>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
